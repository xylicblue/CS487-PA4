apiVersion: apps/v1
kind: Deployment
metadata:
  name: validate-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: validate-api
  template:
    metadata:
      labels:
        app: validate-api
    spec:
      containers:
      - name: validate-api
        image: pa426100249.azurecr.io/validate-api:v1
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "250m"
            memory: "500Mi"
      imagePullSecrets:
      - name: acr-secret
